{{- if .Values.ingress.wildcardCertificate.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.ingress.wildcardCertificate.name }}
  namespace: {{ .Values.ingress.namespace }}
spec:
  secretName: {{ .Values.ingress.wildcardCertificate.secretName }}
  issuerRef:
    name: {{ .Values.certManager.clusterIssuerProdName }}
    kind: ClusterIssuer
  commonName: {{ printf "*.%s" .Values.certManager.dnsZone | quote }}
  dnsNames:
    - {{ .Values.certManager.dnsZone | quote }}
    - {{ printf "*.%s" .Values.certManager.dnsZone | quote }}
{{- end }}
